name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pharmatrack
          POSTGRES_PASSWORD: pharmatrack
          POSTGRES_DB: pharmatrack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pharmatrack -d pharmatrack_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://pharmatrack:pharmatrack@localhost:5432/pharmatrack_test
      TEST_DATABASE_URL: postgresql://pharmatrack:pharmatrack@localhost:5432/pharmatrack_test
      SECRET_KEY: ci-test-secret-key-not-for-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ENVIRONMENT: development
      LOG_LEVEL: WARNING
      SQLALCHEMY_LOG_LEVEL: WARNING

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U pharmatrack; do
            echo "Waiting for postgres..."
            sleep 1
          done

      - name: Run tests
        run: poetry run pytest --tb=short -q
